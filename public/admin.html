<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隐私协议 - 管理后台</title>
  <link rel="stylesheet" href="markdown.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      font-size: 14px;
    }

    .header {
      background: #161b22;
      padding: 16px 24px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 16px;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn-secondary {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .editor-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      background: #21262d;
      padding: 12px 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 500;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .panel-header .badge {
      background: #238636;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      text-transform: none;
      letter-spacing: 0;
    }

    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      padding: 12px 16px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      color: #8b949e;
      font-size: 12px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0d1117;
      border: none;
      border-bottom: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      background: #161b22;
    }

    input::placeholder {
      color: #484f58;
    }

    textarea {
      width: 100%;
      height: 500px;
      padding: 16px;
      background: #0d1117;
      border: none;
      color: #c9d1d9;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: #484f58;
    }

    .preview-panel {
      height: 100%;
    }

    .preview-panel .panel-body {
      padding: 24px;
      height: calc(100% - 45px);
      overflow-y: auto;
      background: #fff;
      color: #24292f;
    }

    .preview-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1a1a;
    }

    .preview-updated {
      color: #666;
      font-size: 13px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e1e4e8;
    }

    .preview-content {
      line-height: 1.7;
    }

    .preview-footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #e1e4e8;
      color: #666;
      font-size: 13px;
      text-align: center;
    }

    .actions-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }

    .btn-primary {
      padding: 10px 24px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover {
      background: #2ea043;
    }

    .btn-primary:disabled {
      background: #21262d;
      color: #484f58;
      cursor: not-allowed;
    }

    .save-status {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .save-status.saved {
      color: #238636;
    }

    .save-status.saving {
      color: #d29922;
    }

    .msg {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .msg.success {
      display: block;
      background: rgba(35, 134, 54, 0.2);
      color: #3fb950;
      border: 1px solid #238636;
    }

    .msg.error {
      display: block;
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
      border: 1px solid #da3633;
    }

    .tips {
      margin-top: 24px;
      padding: 16px 20px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
    }

    .tips h3 {
      color: #8b949e;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tips-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tips code {
      background: #21262d;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      color: #c9d1d9;
    }

    /* Mobile responsive */
    @media (max-width: 1024px) {
      .editor-section {
        grid-template-columns: 1fr;
      }

      textarea {
        height: 350px;
      }

      .preview-panel .panel-body {
        max-height: 400px;
      }
    }

    @media (max-width: 600px) {
      .header {
        padding: 12px 16px;
      }

      .container {
        padding: 16px;
      }

      .actions-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-primary {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ 隐私协议管理后台</h1>
    <div class="header-actions">
      <button class="btn-secondary" onclick="window.open('/index.html', '_blank')">预览页面 ↗</button>
    </div>
  </div>

  <div class="container">
    <div class="editor-section">
      <div class="panel">
        <div class="panel-header">
          <span>📝 编辑器</span>
          <span class="badge">Markdown</span>
        </div>
        <div class="form-group">
          <label>页面标题</label>
          <input type="text" id="title" placeholder="输入页面标题">
        </div>
        <div class="form-group">
          <label>协议内容</label>
          <textarea id="content" placeholder="输入协议内容，支持 Markdown 格式"></textarea>
        </div>
        <div class="form-group">
          <label>页脚文字</label>
          <input type="text" id="footer" placeholder="输入页脚版权信息">
        </div>
      </div>

      <div class="panel preview-panel">
        <div class="panel-header">
          <span>👁️ 实时预览</span>
          <span class="badge">即时更新</span>
        </div>
        <div class="panel-body">
          <h1 class="preview-title" id="previewTitle">标题</h1>
          <div class="preview-updated" id="previewUpdated"></div>
          <div class="preview-content markdown-body" id="previewContent"></div>
          <div class="preview-footer" id="previewFooter"></div>
        </div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn-primary" id="saveBtn" onclick="save()">
        <span>💾</span> 保存更改
      </button>
      <div class="save-status" id="saveStatus"></div>
      <div class="msg" id="msg"></div>
    </div>

    <div class="tips">
      <h3>💡 Markdown 语法提示</h3>
      <div class="tips-grid">
        <code># 一级标题</code>
        <code>## 二级标题</code>
        <code>**粗体**</code>
        <code>*斜体*</code>
        <code>- 列表项</code>
        <code>1. 有序列表</code>
        <code>[链接](URL)</code>
        <code>`行内代码`</code>
        <code>--- 分割线</code>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const API = '/api/admin';
    const saveStatus = document.getElementById('saveStatus');

    // Configure marked
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    // Load current data
    fetch(API)
      .then(r => r.json())
      .then(data => {
        document.getElementById('title').value = data.title || '';
        document.getElementById('content').value = data.content || '';
        document.getElementById('footer').value = data.footer || '';
        updatePreview();
      });

    // Update preview on input with debounce
    let updateTimeout;
    ['title', 'content', 'footer'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        saveStatus.textContent = '● 未保存';
        saveStatus.className = 'save-status';

        clearTimeout(updateTimeout);
        updateTimeout = setTimeout(updatePreview, 150);
      });
    });

    function updatePreview() {
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;
      const footer = document.getElementById('footer').value;

      document.getElementById('previewTitle').textContent = title || '标题';

      // Extract and display last updated date
      const dateMatch = content.match(/最后更新[：:]\s*(\d{4}[-/年]\d{1,2}[-/月]\d{1,2}[日]?)/);
      document.getElementById('previewUpdated').textContent = dateMatch ? `最后更新：${dateMatch[1]}` : '';

      // Render markdown content
      document.getElementById('previewContent').innerHTML = marked.parse(content);
      document.getElementById('previewFooter').textContent = footer;
    }

    function save() {
      const btn = document.getElementById('saveBtn');
      const msg = document.getElementById('msg');
      const data = {
        title: document.getElementById('title').value,
        content: document.getElementById('content').value,
        footer: document.getElementById('footer').value
      };

      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span> 保存中...';
      msg.className = 'msg';
      msg.style.display = 'none';
      saveStatus.textContent = '◐ 保存中...';
      saveStatus.className = 'save-status saving';

      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
      .then(r => r.json())
      .then(() => {
        msg.textContent = '✅ 保存成功';
        msg.className = 'msg success';
        saveStatus.textContent = '✓ 已保存';
        saveStatus.className = 'save-status saved';
      })
      .catch(() => {
        msg.textContent = '❌ 保存失败，请重试';
        msg.className = 'msg error';
        saveStatus.textContent = '✗ 保存失败';
        saveStatus.className = 'save-status';
      })
      .finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<span>💾</span> 保存更改';
      });
    }
  </script>
</body>
</html>
