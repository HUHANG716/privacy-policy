<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>隐私协议</title>
  <link rel="stylesheet" href="markdown.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e9ecef;
      --text-primary: #212529;
      --text-secondary: #495057;
      --text-muted: #6c757d;
      --accent: #4263eb;
      --accent-hover: #364fc7;
      --border: #dee2e6;
      --shadow: rgba(0, 0, 0, 0.1);
      --toc-bg: #f1f3f5;
      --code-bg: #f1f3f5;
    }

    [data-theme="dark"] {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #e9ecef;
      --text-secondary: #adb5bd;
      --text-muted: #868e96;
      --accent: #748ffc;
      --accent-hover: #5c7cfa;
      --border: #373b3e;
      --shadow: rgba(0, 0, 0, 0.3);
      --toc-bg: #16213e;
      --code-bg: #0f3460;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .layout {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      gap: 40px;
    }

    .toc {
      position: sticky;
      top: 40px;
      height: fit-content;
      flex: 0 0 240px;
      order: -1;
    }

    .toc-card {
      background: var(--toc-bg);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    .toc-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .toc-list {
      list-style: none;
    }

    .toc-list li {
      margin-bottom: 10px;
    }

    .toc-list a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      display: block;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }

    .toc-list a:hover,
    .toc-list a.active {
      color: var(--accent);
      background: var(--bg-primary);
      border-left-color: var(--accent);
    }

    .toc-list .toc-h3 {
      padding-left: 24px;
      font-size: 13px;
    }

    .main {
      flex: 1;
      min-width: 0;
    }

    .container {
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 60px;
      box-shadow: 0 4px 20px var(--shadow);
      border: 1px solid var(--border);
    }

    .page-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .last-updated {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .content {
      font-size: 16px;
    }

    .footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
    }

    /* Mobile TOC Toggle */
    .toc-toggle {
      display: none;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 20px;
      text-align: left;
    }

    .toc-mobile {
      display: none;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
        padding: 20px;
      }

      .toc {
        position: static;
        flex: none;
        order: 0;
        width: 100%;
      }

      .toc-card {
        display: none;
      }

      .toc-mobile {
        display: block;
      }

      .toc-mobile.expanded .toc-card {
        display: block;
      }

      .container {
        padding: 30px;
      }

      .page-title {
        font-size: 26px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
        border-radius: 12px;
      }

      .page-title {
        font-size: 22px;
      }

      .content {
        font-size: 15px;
      }

      .theme-toggle {
        top: 12px;
        right: 12px;
        width: 40px;
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>

  <div class="layout">
    <aside class="toc">
      <button class="toc-toggle" id="tocToggle">
        📑 目录
      </button>
      <div class="toc-card">
        <div class="toc-title">目录</div>
        <ul class="toc-list" id="tocList"></ul>
      </div>
    </aside>

    <main class="main">
      <article class="container">
        <h1 class="page-title" id="title">加载中...</h1>
        <div class="last-updated" id="lastUpdated"></div>
        <div class="content markdown-body" id="content"></div>
        <div class="footer" id="footer"></div>
      </article>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // Theme handling
    const themeToggle = document.getElementById('themeToggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');

    function setTheme(dark) {
      document.body.dataset.theme = dark ? 'dark' : 'light';
      themeToggle.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('darkMode', dark);
    }

    // Initialize theme
    const savedDark = localStorage.getItem('darkMode');
    if (savedDark !== null) {
      setTheme(savedDark === 'true');
    } else {
      setTheme(prefersDark.matches);
    }

    themeToggle.addEventListener('click', () => {
      setTheme(document.body.dataset.theme !== 'dark');
    });

    // Mobile TOC toggle
    const tocToggle = document.getElementById('tocToggle');
    const tocCard = document.querySelector('.toc-card');
    tocToggle.addEventListener('click', () => {
      tocCard.style.display = tocCard.style.display === 'none' ? 'block' : 'none';
    });

    // Build TOC from headings
    function buildTOC() {
      const content = document.getElementById('content');
      const tocList = document.getElementById('tocList');
      const headings = content.querySelectorAll('h2, h3');

      tocList.innerHTML = '';
      headings.forEach((heading, i) => {
        const id = `heading-${i}`;
        heading.id = id;
        const li = document.createElement('li');
        li.className = heading.tagName === 'H3' ? 'toc-h3' : '';
        const a = document.createElement('a');
        a.href = `#${id}`;
        a.textContent = heading.textContent;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
          if (window.innerWidth <= 900) {
            tocCard.style.display = 'none';
          }
        });
        li.appendChild(a);
        tocList.appendChild(li);
      });

      // Show TOC toggle on mobile if headings exist
      if (headings.length > 0) {
        document.querySelector('.toc').classList.add('toc-mobile');
        tocCard.style.display = 'none';
      }
    }

    // Active TOC highlighting
    function highlightTOC() {
      const headings = document.querySelectorAll('#content h2, #content h3');
      const tocLinks = document.querySelectorAll('.toc-list a');

      let current = '';
      headings.forEach(heading => {
        const rect = heading.getBoundingClientRect();
        if (rect.top < 150) {
          current = heading.id;
        }
      });

      tocLinks.forEach(link => {
        link.classList.toggle('active', link.getAttribute('href') === `#${current}`);
      });
    }

    // Load and render content
    function parseContent(content) {
      // Extract last updated date from first paragraph if it matches pattern
      const dateMatch = content.match(/最后更新[：:]\s*(\d{4}[-/年]\d{1,2}[-/月]\d{1,2}[日]?)/);
      if (dateMatch) {
        document.getElementById('lastUpdated').textContent = `最后更新：${dateMatch[1]}`;
        // Remove the date line from content
        content = content.replace(/^.*最后更新[：:]\s*\d{4}[-/年]\d{1,2}[-/月]\d{1,2}[日]?.*$/m, '');
      }

      // Parse and render markdown
      document.getElementById('content').innerHTML = marked.parse(content);
      buildTOC();
    }

    fetch('/api/policy')
      .then(r => r.json())
      .then(data => {
        document.getElementById('title').textContent = data.title;
        parseContent(data.content);
        document.getElementById('footer').textContent = data.footer;
      })
      .catch(() => {
        document.getElementById('title').textContent = '加载失败';
        document.getElementById('content').textContent = '请稍后重试';
      });

    // Scroll listener for TOC
    window.addEventListener('scroll', highlightTOC);
  </script>
</body>
</html>
